name: Sync to GitLab

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Push to GitLab
      env:
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
      run: |
        # Извлекаем имя хоста и путь из URL
        REPO_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO#https://}"
        
        # Добавляем GitLab как remote с понятным именем
        git remote add gitlab-mirror "$REPO_URL"
        
        # Пушим только ветки и теги, игнорируя скрытые refs
        git push gitlab-mirror --force --all
        git push gitlab-mirror --force --tags
