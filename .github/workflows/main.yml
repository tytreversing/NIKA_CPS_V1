name: Sync to GitLab

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Push branches to GitLab
      env:
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
      run: |
        # Формируем URL с токеном
        REPO_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO#https://}"
        
        # Добавляем remote
        git remote add gitlab "$REPO_URL"
        
        # Получаем список всех веток (кроме скрытых)
        git branch -r | grep -v '\->' | while read remote; do
          # Извлекаем имя ветки без origin/
          branch=${remote#origin/}
          echo "Pushing branch: $branch"
          git push gitlab "refs/remotes/origin/${branch}:refs/heads/${branch}" --force
        done
        
        # Пушим теги
        git push gitlab --tags --force
